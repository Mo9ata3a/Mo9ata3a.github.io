<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recherche Produits</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f4f4f4;
      padding: 2rem;
    }
    h1 {
      text-align: center;
    }
    #searchBar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    #term, #category, #searchBtn {
      padding: 10px;
      font-size: 16px;
    }
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .alt {
      margin-top: 1rem;
      padding-top: 0.5rem;
      border-top: 1px solid #ccc;
    }
    .alt-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }
    .alt-item img {
      width: 50px;
      height: auto;
      border-radius: 4px;
    }
    .error {
      color: red;
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <h1>Recherche de Produits</h1>

  <div id="searchBar">
    <input type="text" id="term" placeholder="Nom du produit..." />
    <select id="category">
      <option value="">Toutes les catégories</option>
   
      <!-- Ajoute d'autres catégories ici -->
    </select>
    <button id="searchBtn">Rechercher</button>
  </div>

  <div id="results"></div>
  <div class="error" id="errorMsg"></div>

  <script>
    document.getElementById('searchBtn').addEventListener('click', () => {
      const term = document.getElementById('term').value.trim();
	   const API_URL = 'https://mon-api-three.vercel.app';
      const category = document.getElementById('category').value;
      const results = document.getElementById('results');
      const errorMsg = document.getElementById('errorMsg');
      
      results.innerHTML = '';
      errorMsg.textContent = '';

      if (!term) {
        errorMsg.textContent = 'Veuillez entrer un terme de recherche.';
        return;
      }

      fetch(`${API_URL}/api/products/search/${encodeURIComponent(term)}`)
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            errorMsg.textContent = data.error;
            return;
          }

          const filtered = category ? data.filter(p => p.categorie === category) : data;
          if (!filtered.length) {
            errorMsg.textContent = "Aucun produit trouvé.";
            return;
          }

          filtered.forEach(product => {
            const card = document.createElement('div');
            card.className = 'card';

            card.innerHTML = `
              <img src="${product.photo_url}" alt="${product.name}" />
              <h3>${product.name}</h3>
              <p><strong>Prix :</strong> ${product.prix?.trim() || "N/A"} DH</p>
              <p><strong>Catégorie :</strong> ${product.categorie?.replace(/^\d+-/, '') || 'Inconnue'}</p>
            `;

            if (Array.isArray(product.alternatives) && product.alternatives.length > 0) {
              const altHTML = product.alternatives.map(alt => `
                <div class="alt-item">
                  <img src="${alt.photo_url}" alt="${alt.name}" />
                  <div>
                    <strong>${alt.name}</strong><br />
                    Prix : ${alt.prix?.trim() || 'N/A'} DH
                  </div>
                </div>
              `).join('');

              card.innerHTML += `
                <div class="alt">
                  <h4>Alternatives :</h4>
                  ${altHTML}
                </div>
              `;
            }

            results.appendChild(card);
          });
        })
        .catch(err => {
          errorMsg.textContent = 'Erreur lors de la recherche.';
          console.error(err);
        });
    });
  </script>

</body>
</html>
