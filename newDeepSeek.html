<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche de produits</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding: 20px;
            background-color: #f5f5f5;
        }

        header {
            max-width: 800px;
            margin: 0 auto 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 250px;
        }

        #categorySelect {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
            min-width: 180px;
        }

        .products-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-2px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #333;
        }

        .product-price {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .product-category {
            display: inline-block;
            padding: 4px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .alternatives-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .alternative-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            margin-top: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .alternative-image {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .no-results {
            text-align: center;
            color: #666;
            padding: 40px 0;
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
            }
            
            #searchInput, #categorySelect {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <input type="text" id="searchInput" placeholder="Rechercher un produit...">
        <select id="categorySelect">
            <option value="">Toutes les catégories</option>
        </select>
    </header>
    
    <div class="products-grid" id="resultsContainer"></div>

    <script>
        let currentProducts = [];
        let timeoutId;

        // Configuration de la recherche
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                const searchTerm = e.target.value.trim();
                if(searchTerm.length >= 2) {
                    fetchProducts(searchTerm);
                } else {
                    currentProducts = [];
                    updateResults();
                }
            }, 500);
        });

        // Gestion du filtre par catégorie
        document.getElementById('categorySelect').addEventListener('change', updateResults);

        async function fetchProducts(searchTerm) {
            try {
                const response = await fetch(`https://mon-api-three.vercel.app/api/products/search/${encodeURIComponent(searchTerm)}`);
                const products = await response.json();
                currentProducts = products;
                updateCategoryFilter(products);
                updateResults();
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function updateCategoryFilter(products) {
            const categories = [...new Set(products.map(p => p.category))];
            const select = document.getElementById('categorySelect');
            
            // Garder la premičre option
            while(select.options.length > 1) select.remove(1);
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                select.appendChild(option);
            });
        }

        function updateResults() {
            const selectedCategory = document.getElementById('categorySelect').value;
            const filtered = selectedCategory ? 
                currentProducts.filter(p => p.category === selectedCategory) : 
                currentProducts;

            const container = document.getElementById('resultsContainer');
            container.innerHTML = filtered.length > 0 ? 
                filtered.map(product => createProductCard(product)).join('') : 
                '<div class="no-results">Aucun produit trouvé</div>';
        }

        function createProductCard(product) {
            return `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <h3 class="product-name">${product.name}</h3>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                    <div class="product-category">${product.category}</div>
                    ${product.alternatives?.length ? `
                        <div class="alternatives-section">
                            <h4>Alternatives :</h4>
                            ${product.alternatives.map(alt => `
                                <div class="alternative-card">
                                    <img src="${alt.image}" alt="${alt.name}" class="alternative-image">
                                    <div>
                                        <div>${alt.name}</div>
                                        <div class="product-price">$${alt.price.toFixed(2)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }
    </script>
</body>
</html>
